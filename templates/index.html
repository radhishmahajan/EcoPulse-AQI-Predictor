<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPulse | Smart AQI Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #f1f3f5; font-family: 'Inter', sans-serif; }
        .hero { background: linear-gradient(135deg, #2e7d32 0%, #66bb6a 100%); color: white; padding: 40px 0; border-radius: 0 0 25px 25px; margin-bottom: 30px;}
        .card { border-radius: 20px; border: none; }
        .result-card { border-left: 10px solid #2e7d32; }
         #map { height: 350px; width: 100%; border-radius: 20px; margin-top: 20px; }
        .live-badge { background-color: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
    </style>
</head>
<body>

<div class="hero text-center shadow">
    <h1 class="fw-bold">🌱 EcoPulse Smart Dashboard</h1>
    <p>Predicting Urban Air Quality (SDG 11.6)</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow p-4 mb-4">
                <form method="POST">
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Country</label>
                            <select name="country" id="country" class="form-select" required onchange="updateStates()">
                                <option value="">Select</option>
                                {% for c in locations %} <option value="{{c}}">{{c}}</option> {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">State</label>
                            <select name="state" id="state" class="form-select" required onchange="updateCities()">
                                <option value="">Select State</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">City/Area</label>
                            <select name="city" id="city" class="form-select" required>
                                <option value="">Select City</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-success">PM2.5 (µg/m³)</label>
                            <input type="number" step="0.01" name="pm25" class="form-control" placeholder="e.g. 45" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-success">PM10 (µg/m³)</label>
                            <input type="number" step="0.01" name="pm10" class="form-control" value="80.0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-success">NO2 (ppb)</label>
                            <input type="number" step="0.01" name="no2" class="form-control" value="30.0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-success">CO (ppm)</label>
                            <input type="number" step="0.01" name="co" class="form-control" value="1.5">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm mb-3">Analyze Air Quality</button>
                    
                    <div class="text-center">
                        <a href="/history" class="text-success fw-bold text-decoration-none small">📜 View Prediction History</a>
                    </div>
                </form>
            </div>

            {% if result %}
            <div class="card result-card shadow p-4 mb-5 bg-white">
                </div>
            
            <div id="map" class="shadow-sm border"></div>
            <div class="card result-card shadow p-4 mb-5 bg-white">
                <div class="row text-center text-md-start align-items-center">
                    <div class="col-md-5 border-end">
                        <small class="text-muted fw-bold">PREDICTED AQI FOR {{ city | upper }}</small>
                        <h2 class="display-4 fw-bold text-success">{{ result }}</h2>
                        
                        {% if live_aqi %}
                        <div class="live-badge rounded-pill py-1 px-3 d-inline-block mt-2">
                            <small class="fw-bold">📡 LIVE API: {{ live_aqi }}</small>
                        </div>
                        {% endif %}
                    </div>
                    <div class="col-md-7 ps-md-4">
                        <h5 class="fw-bold text-dark mt-2">Health Precautions:</h5>
                        <p class="text-secondary mb-0">{{ status }}</p>
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</div>

<script>
    const locationData = {{ locations | tojson | safe }};

    function updateStates() {
        const country = document.getElementById("country").value;
        const stateSelect = document.getElementById("state");
        const citySelect = document.getElementById("city");
        stateSelect.innerHTML = '<option value="">Select State</option>';
        citySelect.innerHTML = '<option value="">Select City</option>';
        if (country && locationData[country]) {
            Object.keys(locationData[country]).forEach(state => {
                const opt = document.createElement("option");
                opt.value = state; opt.text = state;
                stateSelect.add(opt);
            });
        }
    }

    function updateCities() {
        const country = document.getElementById("country").value;
        const state = document.getElementById("state").value;
        const citySelect = document.getElementById("city");
        citySelect.innerHTML = '<option value="">Select City</option>';
        if (state && locationData[country][state]) {
            locationData[country][state].forEach(city => {
                const opt = document.createElement("option");
                opt.value = city; opt.text = city;
                citySelect.add(opt);
            });
        }
    }
    var map = L.map('map').setView([20.5937, 78.9629], 5); 

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    {% if result %}
        // This adds a marker on India's center for the demo
        L.marker([20.5937, 78.9629]).addTo(map)
            .bindPopup("<b>Analyzing: {{ city }}</b><br>AQI: {{ result }}")
            .openPopup();
            
        // Zoom in slightly when result is shown
        map.setView([20.5937, 78.9629], 6);
    {% endif %}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
